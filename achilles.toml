# Achilles configuration. Copy this into any project you point Achilles at,
# or edit in place. Every field can also be overridden with an ACHILLES_<FIELD>
# environment variable.

# --- the engine (your local model) ---
# LM Studio's OpenAI-compatible server (note the /v1 suffix). Point this at your
# own server/model — either here per project, or globally in ~/.achilles.toml.
base_url = "http://localhost:1234/v1"
api_key  = "no-key"            # LM Studio ignores this
model    = "local-model"       # your model's identifier in LM Studio
request_timeout = 1800         # seconds of silence before Achilles asks "keep waiting?"
                               # (interactive) instead of killing a healthy generation.
                               # NOT a hard cap — saying yes continues the same reply. In a
                               # non-interactive/batch run it aborts at this mark instead.

# --- ComfyUI image generation (optional, OFF by default) ---
# Set comfy_url to give the model a `generate_image` hand: Achilles unloads the
# LM Studio model, renders via ComfyUI, then reloads the model. Leaving it empty
# keeps the tool (and the planner/acceptance image nudges) disabled. Register a
# workflow once (:workflow register <api-export.json>) and it becomes the default.
comfy_url   = "http://127.0.0.1:8188"               # e.g. "http://127.0.0.1:8188" to enable
lms_command = "lms"            # LM Studio CLI used to swap the model in/out

# --- the oracle: THE most important line ---
# The command Achilles runs after every step to decide pass/fail. Without it,
# Achilles is just guessing. This is what lets a weak model converge.
#   Python:  "python -m pytest -q"
#   Node:    "npm test --silent"
#   Rust:    "cargo test --quiet"
#   BreadCraft: whatever builds + checks your .crumb (your toolchain)
verify_command = ""

# --- the loop ---
max_acts_per_step    = 12      # tool calls before we force a verify
max_retries_per_step = 3       # red verifies tolerated before halting a step
auto_approve_plan    = false   # set true to skip the plan confirmation prompt
use_git              = true     # checkpoint each green step

# --- the Definition of Done: the CEILING above the verify_command FLOOR ---
# The planner emits a second artifact (.achilles/done.md): acceptance criteria
# the result must meet, not just "nothing broke". cmd: criteria are checked by
# running a command; judge: criteria by the model as a strict, context-isolated
# reviewer of the files. An empty done.md falls back to oracle-green.
use_acceptance       = true
max_accept_rounds    = 3       # fix→re-judge rounds before halting on unmet criteria
# Model for judge: criteria. Empty = reuse `model` (no second model loaded —
# the fresh, adversarial, evidence-cited judge context handles circularity).
judge_model          = ""

temperature = 0.2
# Hard ceiling on tokens generated per act turn. 0 = auto: Achilles sends NO cap,
# so LM Studio (or llama.cpp) fills the loaded model's own remaining context
# window. Leave it at 0 unless you want to deliberately throttle output length —
# a fixed cap once truncated whole-file writes mid-stream and halted the run.
# If output still truncates at 0, the model's context window is full: reload it
# with a larger context in LM Studio.
max_tokens = 0

# Native (OpenAI) tool-calling. On by default: Achilles sends the tools as a JSON
# schema and reads structured tool_calls back — tool-tuned models (even small 4B
# ones) use their hands far more reliably this way than with the text `act` format
# they were never trained on. Automatic fallback: if the server rejects the tools
# field or the model replies in prose, the text `act` protocol is parsed instead.
# Set to false to force the text protocol (e.g. a server that mishandles tools).
native_tools = true

# --- the tool registry (the model's hands, extensible) ---
# The model always has the four built-in tools (read_file, write_file, list_dir,
# run_command). You can add your OWN, two ways:
#
# 1) Manifest tools — a name + a command template, NO code. {arg} placeholders
#    are filled from the act-block headers; {body} from the act body. Pass = the
#    command's exit code. A new tool announces itself to the model automatically.
#
# [[tool]]
# name = "html_valid"
# description = "Check an HTML file parses with no errors. arg: path"
# command = "python -m html5lib {path}"
#
# 2) Python plugins — point tools_dir at a folder of *.py files. Each file either
#    defines `register(reg)` or a module-level `TOOLS = [Tool(...)]`. Your
#    oracles/static_site.py becomes a tool this way.
#
# tools_dir = "tools"   # relative to the workspace, or an absolute path
